# EO Sanasini — Supervisor config untuk dev
# Laravel artisan serve + Nuxt dev server
# Reload setelah ubah: supervisorctl reread && supervisorctl update

[program:eo-sanasini-laravel]
command=php artisan serve --host=0.0.0.0 --port=8001
directory=/var/www/eo-sanasini/backend
user=root
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/eo-sanasini-laravel.log
stderr_logfile=/var/log/supervisor/eo-sanasini-laravel-err.log
stopwaitsecs=10
environment=HOME="/root"

[program:eo-sanasini-nuxt]
command=npx nuxi dev --host 0.0.0.0 --port 3001
directory=/var/www/eo-sanasini/frontend
user=root
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/eo-sanasini-nuxt.log
stderr_logfile=/var/log/supervisor/eo-sanasini-nuxt-err.log
stopwaitsecs=15
environment=HOME="/root"
