# EO Sanasini — Development environment
# Run: docker compose up -d
# Akses: http://194.233.90.53:3001

services:
  db:
    image: postgres:16-alpine
    container_name: eo-sanasini-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sanasini}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sanasini_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-eo_sanasini}
    ports:
      - "5433:5432" # beda dari host postgres (5432)
    volumes:
      - eo-sanasini-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sanasini} -d ${POSTGRES_DB:-eo_sanasini}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eo-sanasini-net

  app:
    build:
      context: ./frontend
      target: dev
    container_name: eo-sanasini-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-sanasini}:${POSTGRES_PASSWORD:-sanasini_dev_2026}@db:5432/${POSTGRES_DB:-eo_sanasini}?schema=public
      NEXTAUTH_URL: http://194.233.90.53:3001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
    ports:
      - "3001:3001"
    volumes:
      # mount source code untuk hot reload
      - ./frontend/src:/app/src
      - ./frontend/prisma:/app/prisma
      - ./frontend/public:/app/public
      - ./frontend/next.config.mjs:/app/next.config.mjs
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/package.json:/app/package.json
      # jangan mount node_modules (pakai yang di image)
      - /app/node_modules
      - /app/.next
    networks:
      - eo-sanasini-net

volumes:
  eo-sanasini-db-data:
    name: eo-sanasini-db-data

networks:
  eo-sanasini-net:
    name: eo-sanasini-net
    driver: bridge
